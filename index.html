<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Mini App</title>
    <!-- Подключаем Telegram Web Apps API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Погода</h1>
            <p class="subtitle">Выберите город</p>
        </header>

        <!-- Кнопки выбора городов -->
        <div class="city-buttons">
            <button class="btn-city" data-city="Moscow">Москва</button>
            <button class="btn-city" data-city="Saint Petersburg">Санкт-Петербург</button>
            <button class="btn-city" data-city="Izhevsk">Ижевск</button>
            <button class="btn-city" data-city="Simferopol">Крым</button>
        </div>

        <!-- Виджет отображения погоды -->
        <div class="weather-card hidden" id="weatherCard">
            <h2 id="cityName">Город</h2>
            <div class="weather-info">
                <span id="temperature">--°C</span>
                <p id="description">Выберите город для обновления</p>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <span class="label">Влажность:</span>
                    <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span class="label">Ветер:</span>
                    <span id="wind">-- м/с</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
